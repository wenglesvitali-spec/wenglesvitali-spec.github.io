<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>INEP 2025.2</title>

<style>

/* ==================================================
RESET
================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* ==================================================
BODY
================================================== */

body{
    background:#0F1115;
    color:#F5F7FA;
    padding:20px;
    transition:0.4s;
}

/* ==================================================
LIGHT MODE
================================================== */

body.light-mode{
    background:#F4F6F8;
    color:#16181D;
}

body.light-mode .questao-box{
    background:#FFFFFF;
    border:1px solid #E2E6EA;
    box-shadow:
    0 10px 30px rgba(0,0,0,0.04);
}

body.light-mode .alternativa{
    background:#F7F8FA;
    border:1px solid #E4E7EC;
    color:#16181D;
}

body.light-mode .alternativa:hover{
    border:1px solid #7CFFB2;
    background:#FFFFFF;
}

body.light-mode .comentario{
    background:#F2FFF7;
}

body.light-mode .menu-opcoes{
    background:#FFFFFF;
    border:1px solid #E2E6EA;
}

body.light-mode .menu-opcoes button{
    background:#F4F6F8;
    color:#16181D;
}

body.light-mode .voltar{
    background:#E9EDF2;
    color:#16181D;
}

body.light-mode .estatistica{
    background:#FFFFFF;
    border:1px solid #E2E6EA;
}

body.light-mode .btn-menu{
    background:#FFFFFF;
    color:#16181D;
    border:1px solid #E2E6EA;
}

/* ==================================================
CONTAINER
================================================== */

.container{
    max-width:950px;
    margin:auto;
}

/* ==================================================
TOPO CLEAN
================================================== */

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

/* ==================================================
LOGO
================================================== */

.logo-topo{
    font-size:22px;
    font-weight:700;
    color:#7CFFB2;
    letter-spacing:1px;
}

/* ==================================================
MENU
================================================== */

.menu-wrapper{
    position:relative;
}

/* ==================================================
BOTAO ...
================================================== */

.btn-menu{
    width:58px;
    height:58px;
    border:none;
    border-radius:18px;
    background:#171A21;
    border:1px solid #2A2F3A;
    color:#F5F7FA;
    font-size:34px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.25s;
    box-shadow:
    0 10px 30px rgba(0,0,0,0.25);
}

.btn-menu:hover{
    border:1px solid #7CFFB2;
    transform:translateY(-2px);
}

/* ==================================================
MENU DROPDOWN
================================================== */

.menu-opcoes{
    position:absolute;
    top:70px;
    right:0;
    background:#171A21;
    border:1px solid #2A2F3A;
    border-radius:20px;
    padding:12px;
    display:none;
    flex-direction:column;
    gap:10px;
    width:240px;
    z-index:999;
    box-shadow:
    0 20px 40px rgba(0,0,0,0.35);
}

.menu-opcoes button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1D212B;
    color:#F5F7FA;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    text-align:left;
    transition:0.25s;
}

.menu-opcoes button:hover{
    background:#7CFFB2;
    color:#0F1115;
}

/* ==================================================
ESTATISTICAS
================================================== */

.estatisticas{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-bottom:24px;
}

.estatistica{
    padding:12px 18px;
    border-radius:16px;
    background:#171A21;
    border:1px solid #2A2F3A;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    font-weight:600;
}

.acerto{
    color:#7CFFB2;
}

.erro{
    color:#FF6B6B;
}

/* ==================================================
QUESTAO BOX
================================================== */

.questao-box{
    background:#171A21;
    border:1px solid #2A2F3A;
    border-radius:32px;
    padding:40px;
}

/* ==================================================
TITULO
================================================== */

.titulo{
    font-size:30px;
    font-weight:700;
    color:#7CFFB2;
    margin-bottom:28px;
    text-align:center;
}

/* ==================================================
ENUNCIADO
================================================== */

.enunciado{
    font-size:19px;
    line-height:1.9;
    margin-bottom:30px;
}

/* ==================================================
ALTERNATIVAS
================================================== */

.alternativa{
    width:100%;
    padding:18px;
    margin-bottom:14px;
    border-radius:22px;
    background:#1D212B;
    border:1px solid #2A2F3A;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    transition:0.25s;
}

.alternativa:hover{
    border:1px solid #7CFFB2;
}

.texto-alternativa{
    flex:1;
    line-height:1.8;
    font-size:16px;
    cursor:pointer;
}

/* ==================================================
CORTAR
================================================== */

.cortar{
    width:42px;
    height:42px;
    border-radius:14px;
    background:#2A2F3A;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

.cortada{
    opacity:0.35;
    text-decoration:line-through;
}

.correta{
    background:#103222;
    border:1px solid #7CFFB2;
}

.errada{
    background:#3A1C1C;
    border:1px solid #FF6B6B;
}

/* ==================================================
BOTAO RESPONDER
================================================== */

.btn-responder{
    width:100%;
    padding:18px;
    border:none;
    border-radius:22px;
    background:#7CFFB2;
    color:#0F1115;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:24px;
}

/* ==================================================
COMENTARIO
================================================== */

.comentario{
    display:none;
    margin-top:28px;
    padding:24px;
    border-radius:22px;
    background:#13261B;
    border-left:5px solid #7CFFB2;
}

/* ==================================================
NAVEGACAO
================================================== */

.navegacao{
    margin-top:24px;
    display:flex;
    gap:14px;
}

.btn-nav{
    flex:1;
    padding:18px;
    border:none;
    border-radius:22px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
}

.voltar{
    background:#1D212B;
    color:#F5F7FA;
}

.proximo{
    background:#7CFFB2;
    color:#0F1115;
}

/* ==================================================
RESPONSIVO
================================================== */

@media(max-width:768px){

    body{
        padding:12px;
    }

    .logo-topo{
        font-size:18px;
    }

    .btn-menu{
        width:52px;
        height:52px;
        font-size:30px;
    }

    .menu-opcoes{
        width:220px;
    }

    .questao-box{
        padding:24px 18px;
    }

    .titulo{
        font-size:22px;
    }

    .enunciado{
        font-size:16px;
    }

    .texto-alternativa{
        font-size:15px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="topo">

<div class="logo-topo">
INEP 2025.2
</div>

<div class="menu-wrapper">

<button class="btn-menu"
onclick="abrirMenu()">
⋯
</button>

<div class="menu-opcoes"
id="menuOpcoes">

<button onclick="trocarTema()">
🌙 Dark Mode
</button>

<button onclick="aumentarTexto()">
🔍 Aumentar Texto
</button>

<button onclick="diminuirTexto()">
🔎 Diminuir Texto
</button>

<button onclick="finalizarProva()">
🏁 Finalizar Prova
</button>

<button onclick="sairProva()">
🚪 Sair
</button>

</div>

</div>

</div>

<div class="estatisticas">

<div class="estatistica acerto">
👍 <span id="acertos">0</span>
</div>

<div class="estatistica erro">
👎 <span id="erros">0</span>
</div>

</div>

<div class="questao-box"
id="questaoBox">

<h1 class="titulo"
id="tituloQuestao">
QUESTÃO 1
</h1>

<div class="enunciado"
id="enunciado">
Carregando...
</div>

<div id="alternativas"></div>

<button class="btn-responder"
onclick="confirmarResposta()">
Responder Questão
</button>

<div class="comentario"
id="comentario">

<h3 id="respostaCorreta"></h3>

<p id="comentarioTexto"></p>

</div>

</div>

<div class="navegacao">

<button class="btn-nav voltar"
onclick="voltarQuestao()">
⬅ Voltar
</button>

<button class="btn-nav proximo"
onclick="proximaQuestao()">
Próxima ➜
</button>

</div>

</div>

<script>

let questoes = [];

let questaoAtual = 0;

let selecionada = null;

let respondida = false;

let tamanhoTexto =
parseInt(localStorage.getItem("tamanhoTexto"))
|| 19;

/* ===================================================
JSON
================================================== */

fetch("../conteudo/revalida_2025_2.json")

.then(res => res.json())

.then(data => {

    questoes = data;

    carregarQuestao();

})

.catch(() => {

    document.getElementById("enunciado")
    .innerHTML =
    "Erro ao carregar JSON.";

});

/* ==================================================
CARREGAR QUESTAO
================================================== */

function carregarQuestao(){

    respondida = false;

    selecionada = null;

    let q = questoes[questaoAtual];

    if(!q) return;

    document.getElementById("tituloQuestao")
    .innerHTML =
    `QUESTÃO ${q.numero}`;

    document.getElementById("enunciado")
    .innerHTML =
    q.pergunta;

    document.getElementById("comentario")
    .style.display = "none";

    let html = "";

    q.alternativas.forEach((alt,index)=>{

        html += `

        <div class="alternativa"
        id="alt-${index}">

            <div class="texto-alternativa"
            onclick="selecionarAlternativa(${index})">

            ${alt}

            </div>

            <div class="cortar"
            onclick="cortarAlternativa(event,${index})">

            ✂️

            </div>

        </div>

        `;

    });

    document.getElementById("alternativas")
    .innerHTML = html;

    aplicarTamanhoTexto();

}

/* ==================================================
SELECIONAR
================================================== */

function selecionarAlternativa(index){

    if(respondida) return;

    selecionada = index;

    document.querySelectorAll(".alternativa")
    .forEach(item=>{

        item.style.border =
        "1px solid #2A2F3A";

    });

    document.getElementById(`alt-${index}`)
    .style.border =
    "1px solid #7CFFB2";

}

/* ==================================================
RESPONDER
================================================== */

function confirmarResposta(){

    if(respondida) return;

    if(selecionada === null){

        alert("Selecione uma alternativa.");

        return;

    }

    respondida = true;

    let q = questoes[questaoAtual];

    let alternativas =
    document.querySelectorAll(".alternativa");

    alternativas[q.correta]
    .classList.add("correta");

    if(selecionada !== q.correta){

        alternativas[selecionada]
        .classList.add("errada");

    }

    document.getElementById("comentario")
    .style.display = "block";

    document.getElementById("respostaCorreta")
    .innerHTML =
    "✅ Resposta correta: " +
    q.alternativas[q.correta];

    document.getElementById("comentarioTexto")
    .innerHTML =
    q.comentario ||
    "Comentário não disponível.";

}

/* ==================================================
CORTAR
================================================== */

function cortarAlternativa(event,index){

    event.stopPropagation();

    if(respondida) return;

    document.getElementById(`alt-${index}`)
    .classList.toggle("cortada");

}

/* ==================================================
NAVEGACAO
================================================== */

function proximaQuestao(){

    if(questaoAtual < questoes.length - 1){

        questaoAtual++;

        carregarQuestao();

    }

}

function voltarQuestao(){

    if(questaoAtual > 0){

        questaoAtual--;

        carregarQuestao();

    }

}

/* ==================================================
FINALIZAR
================================================== */

function finalizarProva(){

    alert("Prova finalizada!");

}

/* ==================================================
SAIR
================================================== */

function sairProva(){

    location.reload();

}

/* ==================================================
MENU
================================================== */

function abrirMenu(){

    let menu =
    document.getElementById("menuOpcoes");

    if(menu.style.display === "flex"){

        menu.style.display = "none";

    }else{

        menu.style.display = "flex";

    }

}

/* ==================================================
TEMA
================================================== */

function trocarTema(){

    document.body.classList
    .toggle("light-mode");

    let claro =
    document.body.classList
    .contains("light-mode");

    localStorage.setItem(
        "tema",
        claro ? "light" : "dark"
    );

}

/* ==================================================
TAMANHO TEXTO
================================================== */

function aplicarTamanhoTexto(){

    document.querySelector(".enunciado")
    .style.fontSize =
    tamanhoTexto + "px";

    document.querySelectorAll(".texto-alternativa")
    .forEach(item=>{

        item.style.fontSize =
        (tamanhoTexto - 3) + "px";

    });

    localStorage.setItem(
        "tamanhoTexto",
        tamanhoTexto
    );

}

function aumentarTexto(){

    tamanhoTexto += 2;

    aplicarTamanhoTexto();

}

function diminuirTexto(){

    if(tamanhoTexto > 14){

        tamanhoTexto -= 2;

        aplicarTamanhoTexto();

    }

}

/* ==================================================
ONLOAD
================================================== */

window.onload = function(){

    let tema =
    localStorage.getItem("tema");

    if(tema === "light"){

        document.body.classList
        .add("light-mode");

    }

}

</script>

</body>
</html>
