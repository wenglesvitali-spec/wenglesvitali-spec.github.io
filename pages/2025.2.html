
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INEP 2025.2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0F1115;
color:#F5F7FA;
padding:20px;
transition:0.3s;
}

body.light-mode{
background:#F4F6F8;
color:#16181D;
}

.container{
max-width:1000px;
margin:auto;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.logo-topo{
font-size:24px;
font-weight:bold;
color:#7CFFB2;
}

.menu-wrapper{
position:relative;
}

.btn-menu{
width:55px;
height:55px;
border:none;
border-radius:16px;
background:#171A21;
color:white;
font-size:32px;
cursor:pointer;
}

.menu-opcoes{
display:none;
position:absolute;
top:70px;
right:0;
width:240px;
background:#171A21;
padding:12px;
border-radius:18px;
flex-direction:column;
gap:10px;
z-index:999;
}

.menu-opcoes button{
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.estatisticas{
display:flex;
justify-content:flex-start;
gap:10px;
margin-bottom:18px;
}

.estatistica{
padding:0;
font-weight:700;
font-size:13px;
background:none;
border:none;
}

.acertos-box{
color:#22C55E;
}

.erros-box{
color:#EF4444;
}

.questao-box{
background:#171A21;
padding:20px 16px;
border-radius:22px;
}

.titulo{
display:flex;
align-items:center;
justify-content:flex-start;
margin-bottom:25px;
color:#7CFFB2;
font-size:20px;
font-weight:700;
letter-spacing:1px;
}

.enunciado{
font-size:16px;
line-height:1.55;
margin-bottom:18px;
word-break:break-word;
white-space:pre-line;
}

.alternativa{
padding:18px;
border-radius:18px;
background:#1D212B;
margin-bottom:14px;
border:2px solid transparent;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.alternativa:hover{
border-color:#7CFFB2;
}

.texto-alternativa{
flex:1;
cursor:pointer;
}

.cortar{
cursor:pointer;
margin-left:12px;
}

.selecionada{
border-color:#7CFFB2 !important;
background:#243226;
}

.correta{
background:#103222 !important;
border-color:#7CFFB2 !important;
}

.errada{
background:#3A1C1C !important;
border-color:#FF6B6B !important;
}

.cortada{
opacity:0.35;
text-decoration:line-through;
}

.btn-responder{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#7CFFB2;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.btn-comentario{
margin-top:18px;
padding:14px;
width:100%;
border:1px solid #7CFFB2;
border-radius:14px;
cursor:pointer;
font-weight:bold;
background:transparent;
color:#7CFFB2;
}

.comentario-dropdown{
display:none;
margin-top:14px;
padding:18px;
border-radius:16px;
background:#13261B;
line-height:1.8;
}

.navegacao{
display:flex;
gap:12px;
margin-top:20px;
}

.btn-nav{
flex:1;
padding:16px;
border:none;
border-radius:16px;
cursor:pointer;
font-weight:bold;
}

.voltar{
background:#222;
color:white;
}

.proximo{
background:#7CFFB2;
}

.resultados{
display:none;
margin-top:30px;
background:#171A21;
padding:30px;
border-radius:28px;
}

.grafico-box{
max-width:420px;
margin:auto;
}

.resumo{
margin-top:20px;
text-align:center;
font-size:20px;
line-height:1.8;
}

.lista-erros{
margin-top:30px;
}

.item-erro{
background:#1D212B;
padding:18px;
border-radius:18px;
margin-bottom:16px;
}

.item-erro h3{
margin-bottom:10px;
color:#FF6B6B;
}

body.light-mode .questao-box,
body.light-mode .estatistica,
body.light-mode .menu-opcoes,
body.light-mode .resultados{
background:white;
color:#16181D;
}

body.light-mode .alternativa{
background:#F1F3F5;
color:#16181D;
}

body.light-mode .selecionada{
background:#DCFCE7 !important;
border-color:#16A34A !important;
}

body.light-mode .correta{
background:#BBF7D0 !important;
border-color:#16A34A !important;
}

body.light-mode .errada{
background:#FECACA !important;
border-color:#DC2626 !important;
}

body.light-mode .comentario-dropdown{
background:#E5E7EB;
color:#111827;
}

@media(max-width:768px){

.questao-box,
.resultados{
padding:22px;
}

.enunciado{
font-size:16px;
}

}
@media(max-width:768px){

body{
padding:10px;
}

.questao-box{
padding:16px 14px;
border-radius:18px;
}

.enunciado{
font-size:15px;
line-height:1.45;
}

.texto-alternativa{
font-size:14px;
line-height:1.4;
}

.alternativa{
padding:12px;
border-radius:14px;
}

.btn-responder,
.btn-nav,
.btn-comentario{
padding:14px;
font-size:14px;
}
::selection{
background:#FFE96A;
color:#000;
}

::-moz-selection{
background:#FFE96A;
color:#000;
}
}
.enunciado{
user-select:text;
-webkit-user-select:text;
}
mark{
background:#FFE96A;
color:#000;
padding:2px 4px;
border-radius:4px;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">

<div class="logo-topo">
INEP 2025.2
</div>

<div class="menu-wrapper">

<button class="btn-menu"
onclick="abrirMenu()">⋯</button>

<div class="menu-opcoes"
id="menuOpcoes">

<button onclick="trocarTema()">
🌙 Dark Mode
</button>

<button onclick="aumentarTexto()">
🔍 Aumentar Texto
</button>

<button onclick="diminuirTexto()">
🔎 Diminuir Texto
</button>

<button onclick="finalizarProva()">
🏁 Finalizar Prova
</button>

<button onclick="sairProva()">
🚪 Sair
</button>

</div>

</div>

</div>

<div class="estatisticas">

<div class="estatistica acertos-box">
👍 <span id="acertos">0</span>
</div>

<div class="estatistica erros-box">
👎 <span id="erros">0</span>
</div>

</div>

<div class="questao-box">

<h1 class="titulo"
id="tituloQuestao">
QUESTÃO
</h1>

<div class="enunciado"
id="enunciado">
Carregando...
</div>

<div id="alternativas"></div>

<button class="btn-responder"
onclick="confirmarResposta()">
Responder Questão
</button>

<button
class="btn-comentario"
id="btnComentarioAtual"
onclick="toggleComentarioAtual()"
style="display:none;">

⬇ Ver comentário

</button>

<div
class="comentario-dropdown"
id="comentarioAtual">

</div>

</div>

<div class="navegacao">

<button class="btn-nav voltar"
onclick="voltarQuestao()">
⬅ Voltar
</button>

<button class="btn-nav proximo"
onclick="proximaQuestao()">
Próxima ➜
</button>

</div>

<div class="resultados"
id="resultados">

<h1 class="titulo">
RESULTADO FINAL
</h1>

<div class="grafico-box">
<canvas id="graficoResultado"></canvas>
</div>

<div class="resumo"
id="resumoResultado"></div>

<button class="btn-responder"
onclick="salvarProva()"
style="margin-top:20px;">

💾 Salvar Prova

</button>

<div class="lista-erros"
id="listaErros"></div>

</div>

</div>

<script>

let questoes = [];
let questaoAtual = 0;
let selecionada = null;
let respondida = false;

let acertos = 0;
let erros = 0;

let questoesErradas = [];

let tamanhoTexto = 19;

fetch("../conteudo/revalida_2025_2.json")

.then(res => res.json())

.then(data => {

questoes = data;

carregarQuestao();

});

function carregarQuestao(){

respondida = false;
selecionada = null;

let q = questoes[questaoAtual];

if(!q) return;

document.getElementById("tituloQuestao")
.innerHTML =
"QUESTÃO " + q.numero;

document.getElementById("enunciado")
.innerHTML =
q.pergunta.replace(/\\n/g,"<br>");

setTimeout(()=>{

carregarMarcacoes();

},0);

document.getElementById("btnComentarioAtual")
.style.display = "none";

document.getElementById("comentarioAtual")
.innerHTML =
q.comentario ||
"Comentário não disponível.";

document.getElementById("comentarioAtual")
.style.display = "none";

let html = "";

q.alternativas.forEach((alt,index)=>{

html += `
<div class="alternativa"
id="alt-${index}">

<div class="texto-alternativa"
onclick="selecionarAlternativa(${index})">

${alt}

</div>

<div class="cortar"
onclick="cortarAlternativa(event,${index})">

✂️

</div>

</div>
`;

});

document.getElementById("alternativas")
.innerHTML = html;

}

function selecionarAlternativa(index){

if(respondida) return;

selecionada = index;

document.querySelectorAll(".alternativa")
.forEach(item=>{

item.classList.remove("selecionada");

});

document.getElementById(`alt-${index}`)
.classList.add("selecionada");

}

function confirmarResposta(){

document.getElementById("btnComentarioAtual")
.style.display = "block";

if(respondida) return;

if(selecionada === null){

alert("Selecione uma alternativa.");

return;

}

respondida = true;

let q = questoes[questaoAtual];

let alternativas =
document.querySelectorAll(".alternativa");

alternativas[q.correta]
.classList.add("correta");

if(selecionada === q.correta){

acertos++;

document.getElementById("acertos")
.innerText = acertos;

}else{

alternativas[selecionada]
.classList.add("errada");

erros++;

document.getElementById("erros")
.innerText = erros;

questoesErradas.push({

numero:q.numero,
pergunta:q.pergunta,
marcada:q.alternativas[selecionada],
correta:q.alternativas[q.correta],
comentario:q.comentario

});

}

}

function toggleComentarioAtual(){

let div =
document.getElementById("comentarioAtual");

if(div.style.display === "block"){

div.style.display = "none";

}else{

div.style.display = "block";

}

}

function cortarAlternativa(event,index){

event.stopPropagation();

if(respondida) return;

document.getElementById(`alt-${index}`)
.classList.toggle("cortada");

}

function proximaQuestao(){

if(questaoAtual < questoes.length - 1){

questaoAtual++;

carregarQuestao();

}

}

function voltarQuestao(){

if(questaoAtual > 0){

questaoAtual--;

carregarQuestao();

}

}

function abrirMenu(){

let menu =
document.getElementById("menuOpcoes");

if(menu.style.display === "flex"){

menu.style.display = "none";

}else{

menu.style.display = "flex";

}

}

function trocarTema(){

document.body.classList
.toggle("light-mode");

document.getElementById("menuOpcoes")
.style.display = "none";

}

function aumentarTexto(){

tamanhoTexto += 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

function diminuirTexto(){

if(tamanhoTexto > 14){

tamanhoTexto -= 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

}

function finalizarProva(){

document.getElementById("resultados")
.style.display = "block";

let total = acertos + erros;

let porcentagem =
total > 0
? ((acertos / total) * 100).toFixed(1)
: 0;

document.getElementById("resumoResultado")
.innerHTML = `

<p>✅ Acertos:
<strong>${acertos}</strong></p>

<p>❌ Erros:
<strong>${erros}</strong></p>

<p>📊 Aproveitamento:
<strong>${porcentagem}%</strong></p>

`;

let lista = "";

if(questoesErradas.length > 0){

lista +=
"<h2 style='margin-bottom:20px;'>Questões Erradas</h2>";

questoesErradas.forEach(item=>{

lista += `
<div class="item-erro">

<h3>Questão ${item.numero}</h3>

<p style="margin-bottom:10px;">
${item.pergunta}
</p>

<p>
❌ Sua resposta:
<strong>${item.marcada}</strong>
</p>

<p style="margin-top:8px;">
✅ Correta:
<strong>${item.correta}</strong>
</p>

<button
class="btn-comentario"
onclick="toggleComentario(${item.numero})">

⬇ Ver comentário

</button>

<div
class="comentario-dropdown"
id="comentario-${item.numero}">

${item.comentario || "Comentário não disponível."}

</div>

</div>
`;

});

}else{

lista =
"<h2>🎉 Você não errou nenhuma questão!</h2>";

}

document.getElementById("listaErros")
.innerHTML = lista;

gerarGrafico();

}

function toggleComentario(numero){

let div =
document.getElementById(`comentario-${numero}`);

if(div.style.display === "block"){

div.style.display = "none";

}else{

div.style.display = "block";

}

}

function gerarGrafico(){

const ctx =
document.getElementById("graficoResultado");

new Chart(ctx, {

type:"doughnut",

data:{

labels:["Acertos","Erros"],

datasets:[{

data:[acertos, erros],

backgroundColor:[
"#22C55E",
"#EF4444"
],

borderWidth:0

}]

}

});

}

function sairProva(){

location.reload();

}
document.getElementById("enunciado")
.addEventListener("mouseup", function(){

let selection = window.getSelection();

if(!selection.rangeCount) return;

let texto = selection.toString().trim();

if(texto.length < 2) return;

try{

let range = selection.getRangeAt(0);

let mark = document.createElement("mark");

mark.className = "highlight";

range.surroundContents(mark);

selection.removeAllRanges();

salvarMarcacoes();

}catch(e){

console.log("Seleção inválida");

}

});

function salvarMarcacoes(){

localStorage.setItem(

"textoMarcado_" + questaoAtual,

document.getElementById("enunciado").innerHTML

);

}

function carregarMarcacoes(){

let salvo = localStorage.getItem(

"textoMarcado_" + questaoAtual

);

if(salvo){

document.getElementById("enunciado")
.innerHTML = salvo;

}

}
document.addEventListener("click", function(e){

if(e.target.tagName === "MARK"){

let texto =
e.target.innerText;

let textNode =
document.createTextNode(texto);

e.target.parentNode
.replaceChild(textNode, e.target);

salvarMarcacoes();

}

});
function salvarProva(){

let total = acertos + erros;

let porcentagem =
total > 0
? ((acertos / total) * 100).toFixed(1)
: 0;

let prova = {

data: new Date().toLocaleString(),

acertos: acertos,

erros: erros,

porcentagem: porcentagem,

questoesErradas: questoesErradas

};

let provasSalvas =
JSON.parse(
localStorage.getItem("provas_salvas")
) || [];

provasSalvas.push(prova);

localStorage.setItem(
"provas_salvas",
JSON.stringify(provasSalvas)
);

alert("✅ Prova salva com sucesso!");

}
</script>

</body>
</html>
