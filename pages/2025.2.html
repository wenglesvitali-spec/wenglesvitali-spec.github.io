<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>REVALIDA PRO</title>

<style>

/* ==================================================
RESET
================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* ==================================================
BODY
================================================== */

body{
    background:#0F1115;
    color:#F5F7FA;
    padding:20px;
    transition:0.4s;
}

/* ==================================================
LIGHT MODE
================================================== */

body.light-mode{
    background:#F4F6F8;
    color:#16181D;
}

body.light-mode .questao-box,
body.light-mode .resultado-final{
    background:#FFFFFF;
    border:1px solid #E2E6EA;
    box-shadow:
    0 10px 30px rgba(0,0,0,0.04);
}

body.light-mode .alternativa{
    background:#F7F8FA;
    border:1px solid #E4E7EC;
    color:#16181D;
}

body.light-mode .alternativa:hover{
    border:1px solid #7CFFB2;
    background:#FFFFFF;
}

body.light-mode .comentario{
    background:#F2FFF7;
    border-left:5px solid #5DFF9D;
}

body.light-mode .btn-tema{
    background:#FFFFFF;
    color:#16181D;
    border:1px solid #E2E6EA;
}

body.light-mode .voltar{
    background:#E9EDF2;
    color:#16181D;
}

body.light-mode .barra-fundo{
    background:#E4E7EC;
}

body.light-mode .estatistica{
    background:#FFFFFF;
    border:1px solid #E2E6EA;
}

/* ==================================================
CONTAINER
================================================== */

.container{
    max-width:950px;
    margin:auto;
}

/* ==================================================
TOPO
================================================== */

.topo{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
}

/* ==================================================
BOTÕES
================================================== */

.btn-topo{
    width:64px;
    height:64px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:24px;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.25s;
    box-shadow:
    0 8px 25px rgba(0,0,0,0.25);
}

.btn-topo:hover{
    transform:translateY(-2px) scale(1.04);
}

/* ==================================================
SAIR
================================================== */

.sair{
    background:#FF6B6B;
    color:#fff;
}

/* ==================================================
FINALIZAR
================================================== */

.finalizar{
    background:#7CFFB2;
    color:#0F1115;
}

/* ==================================================
BOTAO TEMA
================================================== */

.btn-tema{
    width:84px;
    height:84px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.08);
    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.06),
        rgba(255,255,255,0.02)
    );
    backdrop-filter:blur(12px);
    color:#F5F7FA;
    font-size:34px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
    box-shadow:
    0 15px 40px rgba(0,0,0,0.35);
}

.btn-tema:hover{
    transform:scale(1.05);
    border:1px solid #7CFFB2;
    box-shadow:
    0 0 25px rgba(124,255,178,0.25);
}

/* ==================================================
ESTATISTICAS
================================================== */

.estatisticas{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-bottom:24px;
}

.estatistica{
    padding:12px 18px;
    border-radius:16px;
    background:#171A21;
    border:1px solid #2A2F3A;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:15px;
    font-weight:600;
    box-shadow:
    0 8px 25px rgba(0,0,0,0.2);
}

.acerto{
    color:#7CFFB2;
}

.erro{
    color:#FF6B6B;
}

/* ==================================================
QUESTAO BOX
================================================== */

.questao-box{
    background:#171A21;
    border:1px solid #2A2F3A;
    border-radius:32px;
    padding:40px;
    box-shadow:
    0 20px 60px rgba(0,0,0,0.35);
    transition:0.3s;
}

/* ==================================================
TITULO
================================================== */

.titulo{
    font-size:30px;
    font-weight:700;
    color:#7CFFB2;
    margin-bottom:28px;
    text-align:center;
    letter-spacing:1px;
}

/* ==================================================
ENUNCIADO
================================================== */

.enunciado{
    font-size:19px;
    line-height:1.9;
    color:#F5F7FA;
    margin-bottom:30px;
}

/* ==================================================
ALTERNATIVAS
================================================== */

.alternativa{
    width:100%;
    padding:18px;
    margin-bottom:14px;
    border-radius:22px;
    background:#1D212B;
    border:1px solid #2A2F3A;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    transition:0.25s;
}

.alternativa:hover{
    border:1px solid #7CFFB2;
    background:#222734;
    transform:translateY(-1px);
}

.texto-alternativa{
    flex:1;
    line-height:1.8;
    font-size:16px;
    color:#F5F7FA;
    cursor:pointer;
}

/* ==================================================
BOTAO CORTAR
================================================== */

.cortar{
    width:42px;
    height:42px;
    border-radius:14px;
    background:#2A2F3A;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:0.25s;
}

.cortar:hover{
    background:#FF6B6B20;
}

/* ==================================================
ESTADOS
================================================== */

.cortada{
    opacity:0.35;
    text-decoration:line-through;
}

.correta{
    background:#103222;
    border:1px solid #7CFFB2;
}

.errada{
    background:#3A1C1C;
    border:1px solid #FF6B6B;
}

/* ==================================================
BOTAO RESPONDER
================================================== */

.btn-responder{
    width:100%;
    padding:18px;
    border:none;
    border-radius:22px;
    background:#7CFFB2;
    color:#0F1115;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:24px;
    transition:0.25s;
    box-shadow:
    0 10px 30px rgba(124,255,178,0.2);
}

.btn-responder:hover{
    background:#5DFF9D;
    transform:translateY(-2px);
}

/* ==================================================
COMENTARIO
================================================== */

.comentario{
    display:none;
    margin-top:28px;
    padding:24px;
    border-radius:22px;
    background:#13261B;
    border-left:5px solid #7CFFB2;
}

.comentario h3{
    color:#7CFFB2;
    margin-bottom:12px;
}

.comentario p{
    line-height:1.8;
    color:#D8DEE9;
}

/* ==================================================
NAVEGACAO
================================================== */

.navegacao{
    margin-top:24px;
    display:flex;
    gap:14px;
}

.btn-nav{
    flex:1;
    padding:18px;
    border:none;
    border-radius:22px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
    transition:0.25s;
}

.btn-nav:hover{
    transform:translateY(-2px);
}

.voltar{
    background:#1D212B;
    color:#F5F7FA;
}

.proximo{
    background:#7CFFB2;
    color:#0F1115;
}

/* ==================================================
RESULTADO FINAL
================================================== */

.resultado-final{
    display:none;
    margin-top:30px;
    background:#171A21;
    border-radius:30px;
    border:1px solid #2A2F3A;
    padding:40px;
    box-shadow:
    0 20px 60px rgba(0,0,0,0.35);
}

/* ==================================================
RESPONSIVO
================================================== */

@media(max-width:768px){

    body{
        padding:12px;
    }

    .topo{
        gap:14px;
    }

    .btn-topo{
        width:58px;
        height:58px;
        font-size:22px;
    }

    .btn-tema{
        width:74px;
        height:74px;
        font-size:28px;
    }

    .questao-box{
        padding:24px 18px;
        border-radius:24px;
    }

    .titulo{
        font-size:22px;
    }

    .enunciado{
        font-size:16px;
        line-height:1.8;
    }

    .alternativa{
        padding:15px;
        border-radius:18px;
    }

    .texto-alternativa{
        font-size:15px;
    }

}

</style>

</head>

<body>

<div class="container">

<div class="topo">

<button class="btn-topo sair"
onclick="sairProva()">
🚪
</button>

<button class="btn-tema"
onclick="trocarTema()"
id="botaoTema">
🌙
</button>

<button class="btn-topo finalizar"
onclick="finalizarProva()">
🏁
</button>

</div>

<div class="estatisticas">

<div class="estatistica acerto">
👍 <span id="acertos">0</span>
</div>

<div class="estatistica erro">
👎 <span id="erros">0</span>
</div>

</div>

<div class="questao-box"
id="questaoBox">

<h1 class="titulo"
id="tituloQuestao">
QUESTÃO 1
</h1>

<div class="enunciado"
id="enunciado">
Carregando...
</div>

<div id="alternativas"></div>

<button class="btn-responder"
onclick="confirmarResposta()">
Responder Questão
</button>

<div class="comentario"
id="comentario">

<h3 id="respostaCorreta"></h3>

<p id="comentarioTexto"></p>

</div>

</div>

<div class="navegacao">

<button class="btn-nav voltar"
onclick="voltarQuestao()">
⬅ Voltar
</button>

<button class="btn-nav proximo"
onclick="proximaQuestao()">
Próxima ➜
</button>

</div>

<div class="resultado-final"
id="resultadoFinal">

<h1>🏁 Resultado Final</h1>

</div>

</div>

<script>

let questoes = [];

let questaoAtual = 0;

let selecionada = null;

let respondida = false;

/* ==================================================
JSON
================================================== */

fetch("revalida_2025_2.json")

.then(res => res.json())

.then(data => {

    questoes = data;

    carregarQuestao();

})

.catch(() => {

    document.getElementById("enunciado")
    .innerHTML =
    "Erro ao carregar JSON.";

});

/* ==================================================
CARREGAR QUESTAO
================================================== */

function carregarQuestao(){

    respondida = false;

    selecionada = null;

    let q = questoes[questaoAtual];

    if(!q) return;

    document.getElementById("tituloQuestao")
    .innerHTML =
    `QUESTÃO ${q.numero}`;

    document.getElementById("enunciado")
    .innerHTML =
    q.pergunta;

    document.getElementById("comentario")
    .style.display = "none";

    let html = "";

    q.alternativas.forEach((alt,index)=>{

        html += `

        <div class="alternativa"
        id="alt-${index}">

            <div class="texto-alternativa"
            onclick="selecionarAlternativa(${index})">

            ${alt}

            </div>

            <div class="cortar"
            onclick="cortarAlternativa(event,${index})">

            ✂️

            </div>

        </div>

        `;

    });

    document.getElementById("alternativas")
    .innerHTML = html;

}

/* ==================================================
SELECIONAR
================================================== */

function selecionarAlternativa(index){

    if(respondida) return;

    selecionada = index;

    document.querySelectorAll(".alternativa")
    .forEach(item=>{

        item.style.border =
        "1px solid #2A2F3A";

    });

    document.getElementById(`alt-${index}`)
    .style.border =
    "1px solid #7CFFB2";

}

/* ==================================================
RESPONDER
================================================== */

function confirmarResposta(){

    if(respondida) return;

    if(selecionada === null){

        alert("Selecione uma alternativa.");

        return;

    }

    respondida = true;

    let q = questoes[questaoAtual];

    let alternativas =
    document.querySelectorAll(".alternativa");

    alternativas[q.correta]
    .classList.add("correta");

    if(selecionada !== q.correta){

        alternativas[selecionada]
        .classList.add("errada");

    }

    document.getElementById("comentario")
    .style.display = "block";

    document.getElementById("respostaCorreta")
    .innerHTML =
    "✅ Resposta correta: " +
    q.alternativas[q.correta];

    document.getElementById("comentarioTexto")
    .innerHTML =
    q.comentario ||
    "Comentário não disponível.";

}

/* ==================================================
CORTAR
================================================== */

function cortarAlternativa(event,index){

    event.stopPropagation();

    if(respondida) return;

    document.getElementById(`alt-${index}`)
    .classList.toggle("cortada");

}

/* ==================================================
NAVEGACAO
================================================== */

function proximaQuestao(){

    if(questaoAtual < questoes.length - 1){

        questaoAtual++;

        carregarQuestao();

    }

}

function voltarQuestao(){

    if(questaoAtual > 0){

        questaoAtual--;

        carregarQuestao();

    }

}

/* ==================================================
FINALIZAR
================================================== */

function finalizarProva(){

    document.getElementById("questaoBox")
    .style.display = "none";

    document.querySelector(".navegacao")
    .style.display = "none";

    document.getElementById("resultadoFinal")
    .style.display = "block";

}

/* ==================================================
SAIR
================================================== */

function sairProva(){

    location.reload();

}

/* ==================================================
TEMA
================================================== */

function trocarTema(){

    document.body.classList
    .toggle("light-mode");

    let claro =
    document.body.classList
    .contains("light-mode");

    localStorage.setItem(
        "tema",
        claro ? "light" : "dark"
    );

    atualizarBotao();

}

function atualizarBotao(){

    let claro =
    document.body.classList
    .contains("light-mode");

    document.getElementById("botaoTema")
    .innerHTML =
    claro ? "☀️" : "🌙";

}

window.onload = function(){

    let tema =
    localStorage.getItem("tema");

    if(tema === "light"){

        document.body.classList
        .add("light-mode");

    }

    atualizarBotao();

}

</script>

</body>
</html>
