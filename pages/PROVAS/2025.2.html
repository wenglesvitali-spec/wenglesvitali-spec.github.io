<script>

let questoes = [];

let questaoAtual = 0;

let selecionada = null;

let respondida = false;

let modoProva = false;

let acertos = 0;

let erros = 0;

let tamanhoTexto = 18;

/* =========================================
STATUS DAS QUESTOES
========================================= */

let statusQuestoes = {};

/* =========================================
RESPOSTAS MARCADAS
========================================= */

let respostasUsuario = {};

/* =========================================
QUESTOES RESPONDIDAS
========================================= */

let questoesRespondidas = {};

/* =========================================
SALVAMENTO LOCAL
========================================= */

const STORAGE_KEY = "revalida_progresso";

/* =========================================
SALVAR
========================================= */

function salvarProgresso(){

localStorage.setItem(STORAGE_KEY, JSON.stringify({

questaoAtual,
acertos,
erros,
statusQuestoes,
respostasUsuario,
questoesRespondidas

}));

}

/* =========================================
CARREGAR
========================================= */

function carregarProgresso(){

const dados =
localStorage.getItem(STORAGE_KEY);

if(!dados) return;

const progresso = JSON.parse(dados);

questaoAtual =
progresso.questaoAtual || 0;

acertos =
progresso.acertos || 0;

erros =
progresso.erros || 0;

statusQuestoes =
progresso.statusQuestoes || {};

respostasUsuario =
progresso.respostasUsuario || {};

questoesRespondidas =
progresso.questoesRespondidas || {};

document.getElementById("acertos")
.innerText = acertos;

document.getElementById("erros")
.innerText = erros;

}

/* =========================================
CARREGAR JSON
========================================= */

fetch("../../conteudo/revalida_2025_2.json")

.then(res => res.json())

.then(data => {

questoes = data;

/* CARREGA PROGRESSO */

carregarProgresso();

/* GERA GRADE */

gerarGradeQuestoes();

/* CARREGA QUESTAO */

carregarQuestao();

});

/* =========================================
MENU
========================================= */

function abrirMenu(){

let menu =
document.getElementById("menuOpcoes");

menu.style.display =
menu.style.display === "flex"
? "none"
: "flex";

}


/* =========================================
MODOS
========================================= */

function ativarModoProva(){

modoProva = true;

/* ESCONDE ESTATISTICAS */

document.querySelector(".estatisticas")
.style.display = "none";

/* ATUALIZA GRADE */

gerarGradeQuestoes();

/* RECARREGA QUESTAO */

carregarQuestao();

alert("📝 Modo prova ativado");

}

function ativarModoEstudo(){

modoProva = false;

/* MOSTRA ESTATISTICAS */

document.querySelector(".estatisticas")
.style.display = "flex";

/* ATUALIZA GRADE */

gerarGradeQuestoes();

/* RECARREGA QUESTAO */

carregarQuestao();

alert("📘 Modo estudo ativado");

}


/* =========================================
GERAR GRADE
========================================= */

function gerarGradeQuestoes(){

let html = "";

questoes.forEach((q,index)=>{

let classeStatus = "";

/* =========================================
MODO PROVA
========================================= */

if(modoProva){

if(respostasUsuario[index] !== undefined){

classeStatus = "respondida-prova";

}

/* =========================================
MODO ESTUDO
========================================= */

}else{

if(statusQuestoes[index] === "acertou"){

classeStatus = "acertou";

}

if(statusQuestoes[index] === "errou"){

classeStatus = "errou";

}

}

html += `

<div
class="numero-questao
${index === questaoAtual ? 'ativa' : ''}
${classeStatus}"

onclick="irParaQuestao(${index})">

${q.numero}

</div>

`;

});

document.getElementById("gradeQuestoes")
.innerHTML = html;

}

/* =========================================
IR QUESTAO
========================================= */

function irParaQuestao(index){

questaoAtual = index;

/* SALVA */

salvarProgresso();

/* CARREGA */

carregarQuestao();

/* SCROLL TOPO */

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* =========================================
CARREGAR QUESTAO
========================================= */

function carregarQuestao(){

selecionada = null;

let q = questoes[questaoAtual];

if(!q) return;

/* VERIFICA SE JA RESPONDEU */

respondida =
questoesRespondidas[questaoAtual]
? true
: false;

/* TITULO */

document.getElementById("tituloQuestao")
.innerHTML =
"QUESTÃO " + q.numero;

/* ENUNCIADO */

document.getElementById("enunciado")
.innerHTML =
q.pergunta.replace(/\\n/g,"<br>");

/* COMENTARIO */

document.getElementById("comentarioAtual")
.innerHTML =
q.comentario ||
"Comentário não disponível.";

document.getElementById("comentarioAtual")
.style.display = "none";

document.getElementById("btnComentarioAtual")
.style.display = "none";

/* ALTERNATIVAS */

let html = "";

q.alternativas.forEach((alt,index)=>{

html += `

<div class="alternativa"
id="alt-${index}">

<div class="texto-alternativa"
onclick="selecionarAlternativa(${index})">

${alt}

</div>

<div class="cortar"
onclick="cortarAlternativa(event,${index})">

✂️

</div>

</div>

`;

});

document.getElementById("alternativas")
.innerHTML = html;

/* RESTAURA RESPOSTA */

if(respostasUsuario[questaoAtual] !== undefined){

selecionada =
respostasUsuario[questaoAtual];

const alternativaSalva =
document.getElementById(
`alt-${selecionada}`
);

if(alternativaSalva){

alternativaSalva.classList
.add("selecionada");

}

/* SE JA RESPONDEU */

if(questoesRespondidas[questaoAtual]){

if(!modoProva){

document.querySelectorAll(".alternativa")[q.correta]
.classList.add("correta");

if(selecionada !== q.correta){

document.querySelectorAll(".alternativa")[selecionada]
.classList.add("errada");

}

document.getElementById("btnComentarioAtual")
.style.display = "block";

}

}

}

/* GERA GRADE */

gerarGradeQuestoes();

}

/* =========================================
SELECIONAR
========================================= */

function selecionarAlternativa(index){

/* BLOQUEIA ALTERACAO */

if(respondida) return;

selecionada = index;

/* SALVA RESPOSTA */

respostasUsuario[questaoAtual] = index;

document.querySelectorAll(".alternativa")
.forEach(item=>{

item.classList.remove("selecionada");

});

/* MARCA */

document.getElementById(`alt-${index}`)
.classList.add("selecionada");

/* SALVA */

salvarProgresso();

}

/* =========================================
RESPONDER
========================================= */

function confirmarResposta(){

/* BLOQUEIA RESPOSTA DUPLA */

if(respondida) return;

if(selecionada === null){

alert("Selecione uma alternativa.");

return;

}

respondida = true;

/* MARCA COMO RESPONDIDA */

questoesRespondidas[questaoAtual] = true;

let q = questoes[questaoAtual];

let alternativas =
document.querySelectorAll(".alternativa");

/* MOSTRA CORRETA */

if(!modoProva){

alternativas[q.correta]
.classList.add("correta");

document.getElementById("btnComentarioAtual")
.style.display = "block";

}

/* ACERTO */

if(selecionada === q.correta){

acertos++;

statusQuestoes[questaoAtual] =
"acertou";

document.getElementById("acertos")
.innerText = acertos;

/* ERRO */

}else{

erros++;

statusQuestoes[questaoAtual] =
"errou";

document.getElementById("erros")
.innerText = erros;

if(!modoProva){

alternativas[selecionada]
.classList.add("errada");

}

}

/* ATUALIZA */

gerarGradeQuestoes();

/* SALVA */

salvarProgresso();

}

/* =========================================
COMENTARIO
========================================= */

function toggleComentarioAtual(){

let div =
document.getElementById("comentarioAtual");

div.style.display =
div.style.display === "block"
? "none"
: "block";

}
/* =========================================
TOGGLE COMENTARIO ERRO
========================================= */

function toggleComentarioErro(index){

const div =
document.getElementById(
`comentario-erro-${index}`
);

div.style.display =
div.style.display === "block"
? "none"
: "block";

}
/* =========================================
CORTAR
========================================= */

function cortarAlternativa(event,index){

event.stopPropagation();

/* BLOQUEIA APOS RESPONDER */

if(respondida) return;

document.getElementById(`alt-${index}`)
.classList.toggle("cortada");

}

/* =========================================
TAMANHO TEXTO
========================================= */

function aumentarTexto(){

tamanhoTexto += 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

function diminuirTexto(){

if(tamanhoTexto > 14){

tamanhoTexto -= 2;

document.querySelector(".enunciado")
.style.fontSize =
tamanhoTexto + "px";

}

}

/* =========================================
NAVEGACAO
========================================= */

function proximaQuestao(){

if(questaoAtual < questoes.length - 1){

questaoAtual++;

salvarProgresso();

carregarQuestao();

}

}

function voltarQuestao(){

if(questaoAtual > 0){

questaoAtual--;

salvarProgresso();

carregarQuestao();

}

}

/* =========================================
FINALIZAR
========================================= */

function finalizarProva(){

/* ESCONDE BOTAO FINALIZAR */

document.getElementById("menuOpcoes")
.style.display = "none";

/* MOSTRA RESULTADOS */

document.getElementById("resultados")
.style.display = "block";

let total = acertos + erros;

let porcentagemAcertos =
total > 0
? ((acertos / total) * 100).toFixed(1)
: 0;

let porcentagemErros =
total > 0
? ((erros / total) * 100).toFixed(1)
: 0;

/* QUESTOES ERRADAS */

let htmlErros = "";

questoes.forEach((q,index)=>{

if(statusQuestoes[index] === "errou"){

const respostaUsuario =
respostasUsuario[index];

htmlErros += `

<div class="questao-erro-card">

<div class="questao-erro-titulo">
❌ Questão ${q.numero}
</div>

<div class="questao-erro-info">

<p>
<b>Sua resposta:</b>
${q.alternativas[respostaUsuario]}
</p>

<br>

<p>
<b>Resposta correta:</b>
${q.alternativas[q.correta]}
</p>

</div>

<button
class="btn-toggle-erro"
onclick="toggleComentarioErro(${index})">

⬇ Ver comentário

</button>

<div
class="comentario-erro"
id="comentario-erro-${index}">

${q.comentario || "Comentário não disponível."}

</div>

</div>

`;

}

});

/* HTML RESULTADO */

document.getElementById("resumoResultado")
.innerHTML = `

<p>
✅ Acertos:
<strong>${acertos}</strong>
(${porcentagemAcertos}%)
</p>

<p>
❌ Erros:
<strong>${erros}</strong>
(${porcentagemErros}%)
</p>

<div class="questoes-erradas">

${htmlErros}

</div>

<button
class="btn-responder"
style="margin-top:30px;"
onclick="salvarProvaLocal()">

💾 Salvar prova

</button>

`;

gerarGrafico();

/* SCROLL RESULTADO */

document.getElementById("resultados")
.scrollIntoView({
behavior:"smooth"
});

}
/* =========================================
GRAFICO RESULTADO
========================================= */

function gerarGrafico(){

const canvas =
document.getElementById(
"graficoResultado"
);

if(!canvas) return;

if(window.graficoAtual){
window.graficoAtual.destroy();
}

window.graficoAtual =
new Chart(canvas,{

type:"doughnut",

data:{

labels:[
"Acertos",
"Erros"
],

datasets:[{

data:[
acertos,
erros
],

backgroundColor:[
"#22C55E",
"#EF4444"
],

borderWidth:0

}]

},

options:{

responsive:true,

plugins:{

legend:{
labels:{
color:"#FFFFFF"
}
}

}

}

});

}
/* =========================================
SAIR
========================================= */

function sairProva(){

localStorage.removeItem(STORAGE_KEY);

location.reload();

}
/* =========================================
SALVAR PROVA
========================================= */

function salvarProvaLocal(){

const provas =
JSON.parse(
localStorage.getItem("provas_salvas")
|| "[]"
);

/* QUESTOES ERRADAS */

let questoesErradas = [];

questoes.forEach((q,index)=>{

if(statusQuestoes[index] === "errou"){

questoesErradas.push({

numero:q.numero,

respostaUsuario:
q.alternativas[
respostasUsuario[index]
],

respostaCorreta:
q.alternativas[q.correta],

comentario:
q.comentario ||
"Comentário não disponível."

});

}

});

const novaProva = {

nomeProva:NOME_PROVA,

data:
new Date().toLocaleString(),

acertos,
erros,

questoesErradas,

respostasUsuario,

statusQuestoes

};

provas.push(novaProva);

localStorage.setItem(
"provas_salvas",
JSON.stringify(provas)
);

alert("✅ Prova salva com sucesso!");

}
/* =========================================
DRAG SCROLL GABARITO DESKTOP
========================================= */

const slider =
document.getElementById("gradeQuestoes");

let pressionado = false;

let inicioX;

let scrollInicial;

slider.addEventListener("mousedown",(e)=>{

pressionado = true;

slider.classList.add("arrastando");

inicioX =
e.pageX - slider.offsetLeft;

scrollInicial =
slider.scrollLeft;

});

slider.addEventListener("mouseleave",()=>{

pressionado = false;

slider.classList.remove("arrastando");

});

slider.addEventListener("mouseup",()=>{

pressionado = false;

slider.classList.remove("arrastando");

});

slider.addEventListener("mousemove",(e)=>{

if(!pressionado) return;

e.preventDefault();

const x =
e.pageX - slider.offsetLeft;

const distancia =
(x - inicioX) * 2;

slider.scrollLeft =
scrollInicial - distancia;

});
</script>

</body>
</html>
