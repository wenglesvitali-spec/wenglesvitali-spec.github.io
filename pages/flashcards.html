<link rel="stylesheet" href="../css/style.css">
        <div>
            <h1>Revalida Flashcards</h1>
            <p>Plataforma Inteligente de Revisão</p>
        </div>

        <div class="actions">

            <select id="categoriaFiltro">
                <option value="Todos">Todas Categorias</option>
            </select>

            <button onclick="toggleDark()">
                🌙
            </button>

        </div>

    </header>



    <div class="stats">

        <div class="box">
            <span>Progresso</span>
            <h2 id="counter">0 / 0</h2>
        </div>

        <div class="box">
            <span>Acertos</span>
            <h2 id="acertos">0</h2>
        </div>

        <div class="box">
            <span>Erros</span>
            <h2 id="erros">0</h2>
        </div>

    </div>



    <div class="flashcard" id="flashcard">

        <div class="card-inner">

            <div class="card front">

                <div class="badge" id="categoria">
                    Categoria
                </div>

                <div class="question" id="question">
                    Carregando...
                </div>

                <small>
                    Clique para virar
                </small>

            </div>



            <div class="card back">

                <div class="badge white">
                    Resposta
                </div>

                <div class="answer" id="answer">
                    Resposta
                </div>

            </div>

        </div>

    </div>



    <div class="controls">

        <button onclick="prevCard()">
            ⬅️ Anterior
        </button>

        <button onclick="marcarErro()">
            ❌ Errei
        </button>

        <button class="primary" onclick="marcarAcerto()">
            ✅ Acertei
        </button>

        <button onclick="nextCard()">
            Próximo ➡️
        </button>

    </div>

</div>
<script src="../js/flashcards.js"></script>
