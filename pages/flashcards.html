<!DOCTYPE html>
<html lang="pt-BR">

<head>
<link rel="stylesheet" href="../css/app.css">
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Flashcards Revalida</title>

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Revalida">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="manifest" href="manifest.json">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/flashcards.css">
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header class="topo">

            <div class="logo">
                🧠
            </div>

            <h1>Flashcards</h1>

            <p>
                Plataforma Inteligente de Revisão
            </p>

        </header>

        <!-- ACTIONS -->
        <div class="actions">

            <select id="categoriaFiltro">
                <option value="Todos">
                    Todas Categorias
                </option>
            </select>

            <button class="dark-btn" onclick="toggleDark()">
                🌙
            </button>

        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="box">
                <span>Progresso</span>
                <h2 id="counter">0 / 0</h2>
            </div>

            <div class="box">
                <span>Acertos</span>
                <h2 id="acertos">0</h2>
            </div>

            <div class="box">
                <span>Erros</span>
                <h2 id="erros">0</h2>
            </div>

        </div>

        <!-- FLASHCARD -->
        <div class="flashcard" id="flashcard">

            <div class="card-inner">

                <!-- FRONT -->
                <div class="card front">

                    <div class="badge" id="categoria">
                        Clínica Médica
                    </div>

                    <div class="question" id="question">
                        Carregando pergunta...
                    </div>

                    <small>
                        Toque para virar o card
                    </small>

                </div>

                <!-- BACK -->
                <div class="card back">

                    <div class="badge white">
                        Resposta
                    </div>

                    <div class="answer" id="answer">
                        Resposta
                    </div>

                </div>

            </div>

        </div>

        <!-- CONTROLS -->
        <div class="controls">

            <button onclick="prevCard()">
                ⬅️ Anterior
            </button>

            <button onclick="marcarErro()">
                ❌ Errei
            </button>

            <button class="primary" onclick="marcarAcerto()">
                ✅ Acertei
            </button>

            <button onclick="nextCard()">
                Próximo ➡️
            </button>

        </div>

    </div>

    <script src="../js/flashcards.js"></script>
<script src="../js/app.js"></script>
</body>

</html>
