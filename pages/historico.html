<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico de Evolução</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0F1115;color:white;font-family:Arial;padding:20px;}
.titulo{font-size:28px;margin-bottom:25px;color:#7CFFB2;}
</style>
</head>
<body>
<h1 class="titulo">📈 Histórico de Evolução</h1>
<canvas id="graficoEvolucao" style="max-width:600px;margin:auto;"></canvas>

<script>
let provas = JSON.parse(localStorage.getItem("provas_salvas")) || [];

// Ordena pelo timestamp
provas.sort((a,b)=> new Date(a.data) - new Date(b.data));

let labels = provas.map(p=>p.data);
let porcentagens = provas.map(p=>parseFloat(p.porcentagem));

const ctx = document.getElementById('graficoEvolucao').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Aproveitamento (%)',
            data: porcentagens,
            fill: false,
            borderColor: '#7CFFB2',
            tension: 0.3
        }]
    },
    options: {
        scales: {
            y: { beginAtZero: true, max: 100 }
        }
    }
});
</script>
</body>
</html>
